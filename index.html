<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatZap - Full Screen</title>
    <style>
        /* 1. CONFIGURAÇÕES VISUAIS */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden;
            background-color: #f0f2f5;
        }

        #chat-container { 
            width: 100%; height: 100%; display: flex; flex-direction: column; background: white;
        }
        
        #chat-header { 
            background: #075e54; color: white; padding: 20px; 
            text-align: center; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #messages-area { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 15px; background-color: #e5ddd5;
        }
        
        .message { max-width: 70%; padding: 10px 15px; border-radius: 10px; font-size: 16px; word-wrap: break-word; position: relative; }
        .sent { align-self: flex-end; background-color: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background-color: white; border-bottom-left-radius: 2px; }
        
        .sender-id { font-size: 10px; color: #888; display: block; margin-bottom: 4px; }

        #input-area { border-top: 1px solid #eee; padding: 20px; display: flex; gap: 12px; background: #f0f0f0; }
        #input-area input { flex: 1; border: none; padding: 15px; border-radius: 30px; outline: none; font-size: 16px; }
        #send-btn { background: #075e54; color: white; border: none; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">ChatZap - Online</div>
    
    <div id="messages-area"></div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Digite uma mensagem...">
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script type="module">
    // 1. IMPORTAÇÕES FIREBASE (Apenas Firestore)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. CONFIGURAÇÕES DO PROJETO
    const firebaseConfig = {
        apiKey: "AIzaSyBxbf5ZegJDRGmxfl-ZIquCHBYQpE9QAZQ",
        authDomain: "chatzap-adf7c.firebaseapp.com",
        projectId: "chatzap-adf7c",
        storageBucket: "chatzap-adf7c.firebasestorage.app",
        messagingSenderId: "967612699103",
        appId: "1:967612699103:web:9d9b60ab6097529023b46a",
        measurementId: "G-G6YPGV51Q5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesCol = collection(db, "mensagens");

    // Gerar um ID temporário para esta sessão (para saber quem é você)
    const myId = "User_" + Math.random().toString(36).substring(7);

    // Elementos UI
    const messagesArea = document.getElementById('messages-area');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('send-btn');

    // 3. ENVIAR MENSAGEM
    async function sendMessage() {
        const text = userInput.value.trim();
        if (text !== "") {
            await addDoc(messagesCol, {
                texto: text,
                senderId: myId,
                horario: serverTimestamp()
            });
            userInput.value = "";
        }
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    // 4. ESCUTAR MENSAGENS EM TEMPO REAL
    const q = query(messagesCol, orderBy("horario", "asc"));
    onSnapshot(q, (snapshot) => {
        messagesArea.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const msgDiv = document.createElement('div');
            const isMe = data.senderId === myId;
            
            msgDiv.classList.add('message', isMe ? 'sent' : 'received');
            // Mostra o ID do remetente (abreviado) para identificação
            msgDiv.innerHTML = `<span class="sender-id">${data.senderId}</span> ${data.texto}`;
            
            messagesArea.appendChild(msgDiv);
        });
        messagesArea.scrollTop = messagesArea.scrollHeight;
    });
</script>

</body>
</html>
